1️⃣ First Concept: Lexical Scope (foundation of closures)

Example similar to the video:

function outer(){
    let username = "hitesh"

    function inner(){
        console.log(username)
    }

}

outer()
What happens?

When inner() runs:

JavaScript looks for username inside inner

Not found

Looks in parent scope (outer)

Finds "hitesh"

Output:

hitesh

This is called lexical scoping.

📌 Meaning:
A function can access variables from the scope where it was created.

2️⃣ Now the Important Part — Closure

Now consider this example from the explanation style in the video:

function outer(){
    let username = "hitesh"

    function inner(){
        console.log(username)
    }

    return inner
}

const func = outer()
func()
Step-by-step execution
Step 1

outer() runs

username = "hitesh"
Step 2

outer() returns the function inner

func = inner

So now:

func → function inner()
Step 3

Now we execute:

func()

But here is the interesting part 🤯

outer() has already finished executing.

Normally its variables should disappear.

But when inner() runs, it still prints:

hitesh
3️⃣ Why does this happen?

Because JavaScript forms a closure.

A closure means:

The inner function remembers the variables of its lexical scope even after the outer function has finished executing.

So JavaScript keeps the variables alive in memory.

inner + outer variables = closure
4️⃣ Memory Visualization (as explained conceptually)

When outer() runs:

outer execution context
    username = "hitesh"

When inner is returned:

JavaScript stores:

func
  │
  ├─ function inner()
  └─ reference to lexical environment
        username = "hitesh"

So when func() runs:

console.log(username)

It still finds "hitesh".

5️⃣ Real Definition (same concept from the video)

A closure is:

A function bundled together with its lexical scope.

Meaning:

function + surrounding variables
6️⃣ Example used to show closure power

    return function(){

    }

Why?

Because the returned function remembers count.

7️⃣ Why closures are important in real development

Closures are used in:

🔹 Data hiding
function bankAccount(){
    let balance = 1000

    return {
        getBalance(){
            return balance
        }
    }
}

balance cannot be accessed directly.

🔹 Event handlers

Used heavily in JavaScript DOM events.

🔹 React hooks internally use closures

useState behavior depends on closure concepts.

Think like this:

A function remembers where it was born.

Even if it executes somewhere else later.
