<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | CHAI AUR CODE</title>
</head>
<body style="background-color: #212121; color: #fff">
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>

    </div>
    
</body>

<script>
    const parent = document.querySelector('.parent')
    console.log(parent);
    console.log(parent.children); //returns an HTML collection
    console.log(parent.children[1].innerHTML);

    /*
    for(let i = 0; i < parent.children.length; i++){
        console.log(parent.children[i].innerHTML)
    }
        */

    parent.children[1].style.color = "orange"
    //console.log(parent.firstElementChild);
    //console.log(parent.lastElementChild);


    const dayOne = document.querySelector('.day')
   console.log(dayOne);
   console.log(dayOne.parentElement); //here we are using this instead of query selector because
   //query selector is an expensive operation, it traverses the whole tree, so if we want the parent we can also call it like this and similar for other functions as well
   console.log(dayOne.nextElementSibling); //dayone monday h toh uska bhai next day hoga which is tuesday
   

   //very important
   console.log("NODES: ", parent.childNodes);  //nodes not only counts the elements, it also calculates the spaces and everything 
   //thats how it makes a tree structure
   //no matter the no of line breaks,  it counts one line break for all continuous breaks
   //it also counts the comments if you have put a comment or something
   
   
    
</script>
</html>
